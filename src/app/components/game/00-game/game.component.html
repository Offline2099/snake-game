<app-background [settings]="bgSettings()" />

@if (currentLevel() === null) {
  <app-menu [levels]="levels()" (select)="startLevel($event)" />
} @else {
  <app-level
    [level]="currentLevel()!"
    [nextLevelId]="nextLevelId()"
    (toMenu)="showMenu()"
    (victory)="onVictory()"
  />
}
