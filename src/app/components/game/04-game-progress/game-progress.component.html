<div class="label">Progress: </div>
<div class="progress-bar-container">
  @if (gameState() !== GameState.ready) {
    <div
      class="progress-bar"
      [ngClass]="{
        'delayed negative': latestProgress < 0,
        'positive': latestProgress > 0
      }"
      [ngStyle]="{ 'width': percentage() + '%' }">
    </div>
    <div
      class="progress-bar"
      [ngClass]="{ 'delayed': latestProgress > 0 }"
      [ngStyle]="{ 'width': percentage() + '%' }">
    </div>
  }
</div>
<div class="label value">
  <div class="absolute">{{ progress() }} / {{ goal() }}</div>
  <div class="percentage">({{ percentage() }}%)</div>
</div>
